[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers
markers =
    unit: Pure logic tests — no services needed
    integration: Requires all services running
    functional: Functional verification of known issue fixes
    offline: Cache and fallback behaviour tests

# Output
addopts =
    -v
    --tb=short
    --no-header
    -p no:warnings

# Timeouts (requires pytest-timeout)
# timeout = 130